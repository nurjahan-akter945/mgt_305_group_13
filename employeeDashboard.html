<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

<div class="layout">

    <aside class="sidebar">

        <h2>AI Data Services</h2>

        <ul>

            <li><a href="index.html">🏠 Home</a></li>

            <li><a href="dashboard.html">👥 Clients</a></li>

            <li><a href="employeeDashboard.html">👨‍💼 Employees</a></li>

        </ul>

    </aside>

    <main class="dashboard-container">

    <h1>Employee Dashboard</h1>

    <!-- Dashboard Cards -->
    <div class="dashboard-cards">

        <div class="card">
            <h3>Total Employees</h3>
            <h2 id="totalEmployees">0</h2>
        </div>

        <div class="card">
            <h3>Available</h3>
            <h2 id="availableEmployees">0</h2>
        </div>

        <div class="card">
            <h3>Busy</h3>
            <h2 id="busyEmployees">0</h2>
        </div>

        <div class="card">
            <h3>On Leave</h3>
            <h2 id="leaveEmployees">0</h2>
        </div>

    </div>

    <!-- Search -->
    <div class="search-box">
        <input
            type="text"
            id="searchEmployee"
            placeholder="Search Employee..."
        >
    </div>

    <!-- Employee Table -->
    <table border="1" width="100%" id="employeeTable">

        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Role</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>

        </tbody>

    </table>

</div>
    </main>

</div>

<script src="demoData.js"></script>
<script src="employeeDashboard.js"></script>

</body>
