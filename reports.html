<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Business Reports</h1>

    <div class="dashboard-cards">

        <div class="card">
            <h3>Total Clients</h3>
            <h2 id="totalClients">0</h2>
        </div>

        <div class="card">
            <h3>Total Employees</h3>
            <h2 id="totalEmployees">0</h2>
        </div>

        <div class="card">
            <h3>Total Projects</h3>
            <h2 id="totalProjects">0</h2>
        </div>

        <div class="card">
            <h3>Completed Projects</h3>
            <h2 id="completedProjects">0</h2>
        </div>

    </div>

    <div class="dashboard-cards">

        <div class="card">
            <h3>Pending Projects</h3>
            <h2 id="pendingProjects">0</h2>
        </div>

        <div class="card">
            <h3>Ongoing Projects</h3>
            <h2 id="ongoingProjects">0</h2>
        </div>

        <div class="card">
            <h3>Available Employees</h3>
            <h2 id="availableEmployees">0</h2>
        </div>

        <div class="card">
            <h3>Most Requested Service</h3>
            <h2 id="topService">-</h2>
        </div>

    </div>

</div>

<script src="reports.js"></script>

</body>
</html>
