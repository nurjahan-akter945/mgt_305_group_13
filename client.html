<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Management System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Client Information Management System</h1>

    <form id="clientForm">

        <fieldset>

            <!-- <legend>Client Management</legend> -->


            <div class="form_group">
                <label for="clientId">Client ID:</label>
                <input 
                    type="number" 
                    id="clientId" 
                    placeholder="Enter Client ID"
                    required
                >
            </div>


            <div class="form_group">
                <label for="clientName">Client Name:</label>
                <input 
                    type="text" 
                    id="clientName"
                    placeholder="John Smith"
                    required
                >
            </div>


            <div class="form_group">
                <label for="companyName">Company Name:</label>
                <input 
                    type="text" 
                    id="companyName"
                    placeholder="XYZ Ltd."
                    required
                >
            </div>


            <div class="form_group">
                <label for="email">Client Email:</label>
                <input 
                    type="email" 
                    id="email"
                    placeholder="client@example.com"
                    required
                >
            </div>


            <div class="form_group">
                <label for="phone">Phone Number:</label>
                <input 
                    type="tel" 
                    id="phone"
                    placeholder="+88017XXXXXXXX"
                    required
                >
            </div>


            <div class="form_group">
                <label for="serviceRequired">Service Required:</label>

                <select id="serviceRequired" required>

                    <option value="">Select Service</option>
                    <option value="Data Annotation">Data Annotation</option>
                    <option value="Data Analysis">Data Analysis</option>
                    <option value="Web Scraping">Web Scraping</option>
                    <option value="Landing Page Development">
                        Landing Page Development
                    </option>

                </select>

            </div>


            <div class="form_group">
                <label for="projectStatus">Project Status:</label>

                <select id="projectStatus" required>

                    <option value="">Select Status</option>
                    <option value="Pending">Pending</option>
                    <option value="Ongoing">Ongoing</option>
                    <option value="Completed">Completed</option>
                    <option value="Delivered">Delivered</option>

                </select>

            </div>


            <button type="submit">
                Save Client
            </button>


        </fieldset>

    </form>

</div>

<script src="demoData.js"></script>
<script src="script.js"></script>

</body>
</html>
