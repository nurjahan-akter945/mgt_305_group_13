<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- <div class="dashboard-container"> -->
  <!-- <button id="toggleSidebar" class="toggle-btn">
    ☰
</button> -->

<div class="layout">

    <aside class="sidebar">

        <h2>AI Data Services</h2>

        <ul>

            <li><a href="home.html">🏠 Home</a></li>

            <li><a href="dashboard.html">👥 Clients</a></li>

            <li><a href="employeeDashboard.html">👨‍💼 Employees</a></li>

            <li><a href="projectDashboard.html">📁 Projects</a></li>

            <li><a href="reports.html">📊 Reports</a></li>

        </ul>

    </aside>

    <main class="dashboard-container">

    <h1>Client Dashboard</h1>
    <div class="dashboard-cards">

    <div class="card">
        <h3>Total Clients</h3>
        <h2 id="totalClients">0</h2>
    </div>

    <div class="card">
        <h3>Pending</h3>
        <h2 id="pendingProjects">0</h2>
    </div>

    <div class="card">
        <h3>Ongoing</h3>
        <h2 id="ongoingProjects">0</h2>
    </div>

    <div class="card">
        <h3>Completed</h3>
        <h2 id="completedProjects">0</h2>
    </div>

</div>
    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="Search by Client ID, Name or Company..."
        >
    </div>

    <table border="1" width="100%" id="clientTable">

        <thead>
            <tr>
                <th>Client ID</th>
                <th>Client Name</th>
                <th>Company</th>
                <th>Service</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>

        </tbody>

    </table>

</div>
    </main>

</div>


<script src="dashboard.js"></script>

</body>
</html>
